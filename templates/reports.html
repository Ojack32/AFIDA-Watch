<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Reports (CSV)</title>
</head>
<body>
 <h1>Reports (CSV)</h1>

 {% if files|length == 0 %}
 <p>No reports uploaded yet.</p>
 {% else %}
 <ul>
 {% for f in files %}
 <li><a href="{{ url_for('download', filename=f) }}">{{ f }}</a></li>
 {% endfor %}
 </ul>
 {% endif %}

</body>
</html>
